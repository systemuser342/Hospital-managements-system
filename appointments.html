<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Appointments</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

.container{
    width: 800px;
    margin: auto;
    padding: 20px;
}

h2{
    text-align: center;
    color: #2563eb;
}

.card{
    background: #fff;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.08);
}

input, select{
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button{
    background: #2563eb;
    color: #fff;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 5px;
}

button:hover{
    background: #1e40af;
}

.receipt-title{
    font-weight: bold;
    margin-bottom: 10px;
    color: #111;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 Appointments</h2>

<!-- FORM -->
<div class="card" id="formBox">
<input id="patient" placeholder="Patient Name">

<select id="doctor">
<option value="">Select Doctor</option>
</select>

<input id="date" type="date">
<input id="time" type="time">

<button onclick="save()">Save Appointment</button>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>
let user = localStorage.getItem("user");

if(user){
    user = JSON.parse(user);
}
// LOAD DOCTORS
fetch("http://localhost:3000/doctors")
.then(r=>r.json())
.then(d=>{
    document.getElementById("doctor").innerHTML =
    d.map(x=>`<option value="${x.name}">${x.name}</option>`).join("");
});

// LOAD APPOINTMENTS
function load(){
fetch("http://localhost:3000/appointments")
.then(r=>r.json())
.then(data=>{

let html = "";

data.forEach(a=>{
html += `
<div class="card">

<div class="receipt-title">🏥 Appointment Receipt</div>

<p><b>Patient:</b> ${a.patient_name}</p>
<p><b>Doctor:</b> ${a.doctor_name}</p>
<p><b>Date:</b> ${a.date}</p>
<p><b>Time:</b> ${a.time}</p>

<button onclick="pdf('${a.patient_name}','${a.doctor_name}','${a.date}','${a.time}')">PDF</button>
<button onclick="window.print()">Print</button>

</div>
`;
});

document.getElementById("list").innerHTML = html;
});
}

// SAVE
function save(){

let patient = document.getElementById("patient").value.trim();
let doctor = document.getElementById("doctor").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

if(!patient || !doctor || !date || !time){
    alert("All fields required");
    return;
}

let data = { patient, doctor, date, time };

fetch("http://localhost:3000/appointments",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
}).then(()=>{
    document.getElementById("patient").value="";
    document.getElementById("date").value="";
    document.getElementById("time").value="";
    load();
});
}

// PDF
function pdf(p,d,dt,t){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFont("helvetica");
doc.setFontSize(16);

doc.text("🏥 Arogya Plus Hospital",20,20);

doc.setFontSize(12);
doc.text("Appointment Receipt",20,35);

doc.line(20,40,190,40);

doc.text("Patient: " + p,20,55);
doc.text("Doctor: " + d,20,65);
doc.text("Date: " + dt,20,75);
doc.text("Time: " + t,20,85);

doc.save("appointment.pdf");
}

// INIT
load();

</script>

</body>
</html>
