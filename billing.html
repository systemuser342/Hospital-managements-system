<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Billing</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:800px;
    margin:auto;
    padding:20px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    color:#2563eb;
    margin:0;
}

.card{
    background:#fff;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:#2563eb;
    color:#fff;
    padding:10px;
    border:none;
    cursor:pointer;
    margin-top:5px;
    border-radius:6px;
}

button:hover{
    background:#1e40af;
}

h2{
    text-align:center;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>🏥 Arogya Plus Hospital</h1>
    <p>Billing Management System</p>
    
</div>


<h2>💰 Billing System</h2>

<!-- FORM -->
<div class="card">
    <input id="name" placeholder="Patient Name">
    <input id="amount" placeholder="Amount">
    <button onclick="save()">Save Bill</button>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>



// LOAD
function load(){
fetch("http://localhost:3000/bills")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(b=>{
html+=`
<div class="card">

<h3>🏥 Billing Receipt</h3>

<p><b>Name:</b> ${b.name}</p>
<p><b>Amount:</b> ₹${b.amount}</p>

<button onclick="window.print()">Print</button>
<button onclick="pdf('${b.name}','${b.amount}')">PDF</button>

</div>`;
});

document.getElementById("list").innerHTML=html;
});
}

// SAVE
function save(){

let name=document.getElementById("name").value.trim();
let amount=document.getElementById("amount").value.trim();

if(!name||!amount){
alert("All fields required");
return;
}

fetch("http://localhost:3000/bills",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,amount})
}).then(()=>{
document.getElementById("name").value="";
document.getElementById("amount").value="";
load();
});
}

// PRINT
function print(){
window.print();
}

// PDF (FIXED CLEAN FORMAT)
function pdf(n,a){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFont("helvetica");
doc.setFontSize(16);

doc.text("🏥 Arogya Plus Hospital",20,20);
doc.text("Billing Receipt",20,35);

doc.setFontSize(12);
doc.text("Patient: " + n,20,55);
doc.text("Amount: Rs " + a,20,65);

doc.line(20,75,190,75);

doc.text("Thank you for visiting!",20,90);

doc.save("bill.pdf");
}

// INIT
load();

</script>

</body>
</html>
