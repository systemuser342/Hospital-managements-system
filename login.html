<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.box{
    background:white;
    padding:35px;
    width:340px;
    border-radius:14px;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
    text-align:center;
    animation:fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.box h2{
    margin-bottom:20px;
    color:#2563eb;
}

.input-group{
    text-align:left;
    margin-bottom:15px;
}

.input-group label{
    font-size:14px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 5px rgba(37,99,235,0.5);
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#1e40af;
}

button:disabled{
    background:#9ca3af;
    cursor:not-allowed;
}

#msg{
    margin-top:12px;
    font-size:14px;
}
</style>

</head>
<body>

<div class="box">

<h2>🏥 Login</h2>

<div class="input-group">
<label>Username</label>
<input id="username" placeholder="Enter username">
</div>

<div class="input-group">
<label>Password</label>
<input id="password" type="password" placeholder="Enter password">
</div>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

// ================= AUTO REDIRECT (SAFE) =================
(function () {
    const stored = localStorage.getItem("user");

    if (stored) {
        try {
            const user = JSON.parse(stored);

            if (user && user.role && window.location.pathname.includes("login.html")) {
             window.location.replace("dashboard.html");
                }
        } catch (e) {
            localStorage.removeItem("user");
        }
    }
})();


// ================= LOGIN FUNCTION =================
function login() {

let username = document.getElementById("username").value.trim();
let password = document.getElementById("password").value.trim();
let msg = document.getElementById("msg");
let btn = document.querySelector("button");

if (!username || !password) {
    msg.style.color = "red";
    msg.innerText = "⚠️ Enter username & password";
    return;
}

btn.disabled = true;
btn.innerText = "Logging...";

fetch("http://localhost:3000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
})
.then(res => res.json())
.then(data => {

    btn.disabled = false;
    btn.innerText = "Login";

    if (data.success) {

        localStorage.setItem("user", JSON.stringify(data.user));

        // FIXED: replace use karo (no back redirect loop)
        window.location.replace("dashboard.html");

    } else {
        msg.style.color = "red";
        msg.innerText = "❌ Invalid login";
    }

})
.catch(() => {
    btn.disabled = false;
    btn.innerText = "Login";
    msg.style.color = "red";
    msg.innerText = "❌ Server error";
});

}

</script>
</body>
</html>
